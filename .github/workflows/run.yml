name: Obilet Sheet Check

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Istenen tarih (YYYY-MM-DD). Bos birakilirsa yarin kullanilir."
        required: false
        type: string
      target_city:
        description: "Virgulle ayrilmis sehir listesi. Bos birakilirsa tum aktifler."
        required: false
        type: string
      trigger_chat_id:
        description: "Komutu calistiran Telegram chat id"
        required: false
        type: string
      trigger_user_label:
        description: "Komutu calistiran kullanici bilgisi"
        required: false
        type: string

concurrency:
  group: obilet-sheet-check
  cancel-in-progress: false

jobs:
  run-check:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Paketleri kur
        run: npm install

      - name: Playwright browser kur
        run: npx playwright install --with-deps chromium

      - name: Scripti calistir
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          TARGET_CITY: ${{ github.event.inputs.target_city }}
          TRIGGER_CHAT_ID: ${{ github.event.inputs.trigger_chat_id }}
          TRIGGER_USER_LABEL: ${{ github.event.inputs.trigger_user_label }}
        run: npm start
